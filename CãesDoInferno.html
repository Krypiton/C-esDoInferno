<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>caesdoinferno.cc</title>
<link rel="canonical" href="https://caesdoinferno.cc">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#000;
color:#fff;
font-family:Arial, Helvetica, sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Tela inicial */
#enterScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
color:white;
letter-spacing:2px;
cursor:pointer;
z-index:10;
text-align:center;
}

#enterScreen:hover{
color:red;
}

/* Conteudo do site */
#mainSite{
display:none;
flex-direction:column;
align-items:center;
}

.container{
display:flex;
gap:80px;
}

.card{
border:2px solid red;
border-radius:20px;
padding:40px;
text-align:center;
box-shadow:0 0 25px red;
width:220px;
}

.profile{
width:120px;
height:120px;
border-radius:50%;
border:3px solid red;
object-fit:cover;
}

.name{
margin-top:15px;
font-size:24px;
color:red;
}

.subtitle{
color:#aaa;
margin-bottom:20px;
}

.discord{
margin-top:10px;
font-size:32px;
color:red;
cursor:pointer;
transition:0.2s;
}

.discord:hover{
color:white;
transform:scale(1.2);
}

</style>
</head>

<body>

<!-- Tela inicial -->
<div id="enterScreen" onclick="enterSite()">
click para entrar
</div>

<!-- Conteudo principal -->
<div id="mainSite">

<div class="container">

<!-- PERFIL 1 -->
<div class="card">

<img class="profile" src="perfil1.jpg">

<div class="name">NUEL ⛧</div>
<div class="subtitle">Kill to Live</div>
<div class="subtitle">- Council -</div>

<i class="fa-brands fa-discord discord" onclick="copyDiscord('olharesvazio')"></i>

</div>

<!-- PERFIL 2 -->
<div class="card">

<img class="profile" src="perfil2.jpg">

<div class="name">rwmzw</div>
<div class="subtitle">Fuck humanity</div>
<div class="subtitle">- Council -</div>

<i class="fa-brands fa-discord discord" onclick="copyDiscord('rwmzw')"></i>

</div>

</div>

</div>

<audio id="music" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

function copyDiscord(nick){

navigator.clipboard.writeText(nick);

alert("Nick do Discord copiado: " + nick);

}

function enterSite(){

let music = document.getElementById("music");

music.volume = 0.6;

music.play();

document.getElementById("enterScreen").style.display = "none";

document.getElementById("mainSite").style.display = "flex";

}

</script>

</body>
</html>
